name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  DOTNET_VERSION: 10.0.x
  PROJECT_PATH: src/DbExport.Gui/DbExport.Gui.csproj
  APP_NAME: dbexport

jobs:
  build-windows:
    runs-on: windows-latest

    strategy:
      matrix:
        runtime: [ win-x64, win-arm64 ]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: microsoft/setup-msbuild@v2

      - name: Publish
        run: |
          msbuild ${{ env.PROJECT_PATH }} `
            /t:Restore,Publish `
            /p:Configuration=Release `
            /p:RuntimeIdentifier=${{ matrix.runtime }} `
            /p:Version=${{ steps.version.outputs.VERSION }} `
            /p:PublishDir=publish\${{ matrix.runtime }}\

      - name: Package
        shell: bash
        run: |
          cd publish/${{ matrix.runtime }}
          zip ../../${{ env.APP_NAME }}-${{ steps.version.outputs.VERSION }}-${{ matrix.runtime }}.zip *

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.runtime }}
          path: "*.zip"

  build-linux:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        runtime: [linux-x64, linux-arm64]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -r ${{ matrix.runtime }} -p:Version=${{ steps.version.outputs.VERSION }} -o publish/${{ matrix.runtime }}

      - name: Package
        run: |
          cd publish/${{ matrix.runtime }}
          tar -czf ../../${{ env.APP_NAME }}-${{ steps.version.outputs.VERSION }}-${{ matrix.runtime }}.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.runtime }}
          path: "*.tar.gz"

  build-macos:
    runs-on: macos-latest

    strategy:
      matrix:
        runtime: [osx-arm64]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -r ${{ matrix.runtime }} -p:Version=${{ steps.version.outputs.VERSION }} -o publish/${{ matrix.runtime }}

      - name: Package
        run: |
          cd publish/${{ matrix.runtime }}
          tar -czf ../../${{ env.APP_NAME }}-${{ steps.version.outputs.VERSION }}-${{ matrix.runtime }}.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.runtime }}
          path: "*.tar.gz"

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - name: Collect artifacts
        run: |
          mkdir release
          find . -name "*.zip" -exec mv {} release/ \;
          find . -name "*.tar.gz" -exec mv {} release/ \;

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*