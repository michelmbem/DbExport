name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  DOTNET_VERSION: 10.0.x
  PROJECT_PATH: src/DbExport.Gui/DbExport.Gui.csproj
  APP_NAME: dbexport

jobs:
  build:
    strategy:
      matrix:
        include:
          - runtime: win-x64
            os: windows-latest

          - runtime: win-arm64
            os: windows-latest

          - runtime: linux-x64
            os: ubuntu-latest

          - runtime: linux-arm64
            os: ubuntu-latest

          - runtime: osx-arm64
            os: macos-latest
        
    name: Build ${{ matrix.runtime }}
    runs-on: ${{ matrix.os }}
  
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
  
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
  
      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}
  
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
  
      - name: Publish
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -c Release \
            -r ${{ matrix.runtime }} \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o publish/${{ matrix.runtime }}
  
      - name: Package artifact
        run: |
          cd publish/${{ matrix.runtime }}
          
          if [[ "${{ matrix.runtime }}" == win-* ]]; then
            zip ../../${{ env.APP_NAME }}-${{ steps.version.outputs.VERSION }}-${{ matrix.runtime }}.zip *
          else
            tar -czf ../../${{ env.APP_NAME }}-${{ steps.version.outputs.VERSION }}-${{ matrix.runtime }}.tar.gz *
          fi
  
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.runtime }}
          path: |
            *.zip
            *.tar.gz
    
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Move artifacts
        run: |
          mkdir release
          find . -name "*.zip" -exec mv {} release/ \;
          find . -name "*.tar.gz" -exec mv {} release/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*